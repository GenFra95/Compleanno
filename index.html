<div class="rsvp-form">
  <input type="text" id="nome" placeholder="Il tuo nome">
  <input type="text" id="intolleranze" placeholder="Intolleranze o allergie">
  <a id="rsvpBtn" class="btn btn-primary">Ci sarò 🎉</a>
</div>

<script>
document.getElementById('rsvpBtn').onclick = function(){
  const nome = document.getElementById('nome').value.trim();
  const intol = document.getElementById('intolleranze').value.trim() || "no";
  if(!nome){ alert("Inserisci il tuo nome"); return; }

  // Lancia confetti e suono
  launchConfetti(window.innerWidth/2);
  playSound();
  showThankYou();

  // WhatsApp link direttamente dal click
  const msg = `Ciao Maria! Sono ${nome} e ci sarò 🎉. Intolleranze: ${intol}`;
  const url = "https://wa.me/393XXXXXXXXX?text=" + encodeURIComponent(msg);
  this.href = url;
  this.target = "_blank";
};
</script>
